# Name: Collect Employee rewards
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName:
    triggerQueries:
      - collect employee rewards
      - claim my employee reward
      - redeem employee points
      - get my staff rewards
      - employee reward collection
      - how do I collect my rewards as an employee?
      - pick up my employee bonus
      - access my staff incentives
      - employee perks redemption

  actions:
    - kind: ConditionGroup
      id: ConditionGroup_checkEmployeeIdentified
      conditions:
        - id: ConditionItem_employeeNotIdentified
          condition: =Not(Global.EmplyeeIdentified)
          actions:
            - kind: BeginDialog
              id: BeginDialog_collectEmployeeData
              dialog: CollectEmployeeData

    - kind: Question
      id: Question_L1omP9
      variable: Topic.RewardChoice
      prompt: 'Please choose your reward:'
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          optionSetName: RewardOptions
          items:
            - id: dinner
              displayName: A free dinner

            - id: theatre
              displayName: A visit to theatre

    - kind: ConditionGroup
      id: ConditionGroup_3UEdyD
      conditions:
        - id: ConditionItem_yLTSZ2
          condition: =Topic.RewardChoice = RewardOptions.dinner
          actions:
            - kind: SendActivity
              id: SendActivity_6qlwmo
              activity: The dinner voucher will be forwarded to you.

      elseActions:
        - kind: SendActivity
          id: SendActivity_cKeGUj
          activity: The tickets will be send to you per post mail.

inputType: {}
outputType: {}
